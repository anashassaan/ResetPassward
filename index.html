<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Quran — Reset Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0B4A32 0%, #0D1B2A 50%, #042B3A 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 400px;
      color: #fff;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-arabic {
      font-size: 28px;
      color: #C9A84C;
      display: block;
      margin-bottom: 4px;
    }
    .logo-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    p.sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }
    .field {
      position: relative;
      margin-bottom: 14px;
    }
    .field input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus {
      border-color: rgba(201,168,76,0.6);
    }
    .field input::placeholder { color: rgba(255,255,255,0.35); }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: #1A6B42;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    .msg.error { background: rgba(186,26,26,0.18); color: #FF8A80; display: block; }
    .msg.success { background: rgba(26,107,66,0.25); color: #69F0AE; display: block; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-arabic">بِسۡمِ ٱللَّهِ</span>
      <span class="logo-title">Al Quran</span>
    </div>
    <h2>Reset Password</h2>
    <p class="sub">Enter your new password below.</p>

    <div id="form-section">
      <div class="field">
        <input type="password" id="pass" placeholder="New password (min 8 characters)" />
      </div>
      <div class="field">
        <input type="password" id="confirm" placeholder="Confirm new password" />
      </div>
      <button id="btn" onclick="resetPassword()">Reset Password</button>
      <div class="msg" id="msg"></div>
    </div>

    <div id="success-section" style="display:none; text-align:center; padding: 16px 0;">
      <div style="font-size: 48px; margin-bottom: 12px;">✅</div>
      <h2 style="margin-bottom: 8px;">Password Updated!</h2>
      <p class="sub">Your password has been changed successfully.<br/>You can now log in with your new password.</p>
    </div>
  </div>

  <script>
    const APPWRITE_ENDPOINT = 'https://sgp.cloud.appwrite.io/v1';
    const PROJECT_ID = '69a2c5de001b66d46362';

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    const userId = getParam('userId');
    const secret = getParam('secret');

    if (!userId || !secret) {
      showMsg('Invalid or expired reset link. Please request a new one.', 'error');
      document.getElementById('btn').disabled = true;
    }

    async function resetPassword() {
      const pass = document.getElementById('pass').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('btn');

      if (pass.length < 8) {
        showMsg('Password must be at least 8 characters.', 'error'); return;
      }
      if (pass !== confirm) {
        showMsg('Passwords do not match.', 'error'); return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Resetting…';
      hideMsg();

      try {
        const res = await fetch(`${APPWRITE_ENDPOINT}/account/recovery`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Appwrite-Project': PROJECT_ID,
          },
          body: JSON.stringify({ userId, secret, password: pass }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Reset failed');

        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      } catch (e) {
        showMsg(e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Reset Password';
      }
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }
    function hideMsg() {
      const el = document.getElementById('msg');
      el.className = 'msg';
    }
  </script>
</body>
</html>
